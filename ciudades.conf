# Configuración de ciudades para tiempo3.py
# Formato: nombre|query_weatherapi|propiedad_moo
# Las líneas que empiezan por # son comentarios.
#
# La propiedad MOO admite dos formatos:
#   \#<número>.<propiedad>   — referencia por número de objeto (ej: \#146.ambiente)
#   \$<nombre>.<propiedad>   — referencia por nombre global   (ej: \$madrid.ambiente)
#
# Ejemplos:
#   NuevaCiudad|Nueva Ciudad,ES|\#9999.ambiente
#   NuevaCiudad|Nueva Ciudad,ES|\$nuevaciudad.ambiente

Madrid|Madrid|\#146.ambiente
Guadalajara|Guadalajara,ES|\$guadalajara.ambiente
Zaragoza|zaragoza|\$zaragoza.ambiente
Lleida|Lleida|\$lerida.ambiente
Barcelona|Barcelona|\$barcelona.ambiente
Valencia|Valencia|\$valencia.ambiente
Sevilla|Sevilla|\$sevilla.ambiente
Málaga|Málaga|\$malaga.ambiente
Alicante|Alicante|\$alicante.ambiente
